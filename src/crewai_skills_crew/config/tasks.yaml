# config/tasks.yaml
# Single task — the goal is injected at runtime via CrewHub inputs.

execute_task:
  agent: executor
  description: >
    Complete the following task fully and correctly:

    {goal}

    Start by calling list_skills to see what you have available.
    Then load the relevant skills and execute.
    Keep going until the task is done and all outputs are verified.
  expected_output: >
    A clear summary of what was done, what files were created,
    and confirmation that the task is complete.
